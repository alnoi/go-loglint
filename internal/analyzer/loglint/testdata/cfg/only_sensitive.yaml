rules:
  lowercase: false
  englishOnly: false
  noEmoji: false
  sensitive: true

sensitive:
  patterns:
    - password
    - token
    - apikey
    - secret
    - private_key
  allowlist:
    - tokenbucket
    - tokenized
    - secretariat

logAPIs:
  - packagePath: "log/slog"
    receiverPkgPath: "log/slog"
    receiverType: "Logger"
    methods: ["Debug", "Info", "Warn", "Error"]

  - receiverPkgPath: "go.uber.org/zap"
    receiverType: "Logger"
    methods: ["Debug", "Info", "Warn", "Error", "DPanic", "Panic", "Fatal"]

exclude:
  paths: []
  files: []